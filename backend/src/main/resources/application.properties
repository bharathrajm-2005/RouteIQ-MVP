# Spring Boot Server
server.port=8080
spring.application.name=routeiq-backend

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/routeiq?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
spring.datasource.username=root
spring.datasource.password=routeiq123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
app.jwt.secret=RouteIQ_Super_Secret_JWT_Key_2024_Production_Grade_256bit_Minimum
app.jwt.expiration-ms=86400000

# Python Microservice
app.python.base-url=http://localhost:8000

# Claude API
app.claude.api-key=${CLAUDE_API_KEY:sk-placeholder}
app.claude.model=claude-sonnet-4-20250514

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# Logging
logging.level.com.routeiq=INFO
logging.level.org.springframework.security=WARN
