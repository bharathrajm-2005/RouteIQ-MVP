version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: routeiq-mysql
    environment:
      MYSQL_ROOT_PASSWORD: routeiq123
      MYSQL_DATABASE: routeiq
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  python-service:
    build: ./python-service
    container_name: routeiq-python
    ports:
      - "8000:8000"
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: routeiq-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/routeiq?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: routeiq123
      APP_PYTHON_BASE_URL: http://python-service:8000
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-sk-placeholder}
    depends_on:
      mysql:
        condition: service_healthy
      python-service:
        condition: service_started
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: routeiq-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mysql_data:
